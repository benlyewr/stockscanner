name: Daily Buy Signal Alert

on:
  schedule:
    # 21:30 UTC Mon-Fri = ~1.5h after US market close = 5:30am SGT
    - cron: "30 21 * * 1-5"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab to test

jobs:
  scan-and-alert:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance pandas numpy requests

      - name: Run scanner and send Telegram alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python daily_alert.py
